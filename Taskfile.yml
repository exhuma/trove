version: '3'

dotenv: ['.env']

# One responsive build shares one core and one Supabase backend, builds to dist/,
# and deploys to a single Cloudflare Pages project.
tasks:
  install:
    desc: Install dependencies
    cmds:
      - npm ci

  dev:
    desc: Run the dev server
    cmds:
      - npm run dev

  build:
    desc: Type-check and build the static bundle into dist/
    cmds:
      - npm run build

  preview:
    desc: Serve the built bundle locally to sanity-check it
    deps: [build]
    cmds:
      - npm run preview

  deploy:
    desc: Build and deploy to Cloudflare Pages
    deps: [build]
    cmds:
      # Requires `wrangler login` once, or CLOUDFLARE_API_TOKEN in the env.
      # $PAGES_PROJECT is set in .env (see .env.example).
      - npx wrangler pages deploy dist --project-name "$PAGES_PROJECT"
